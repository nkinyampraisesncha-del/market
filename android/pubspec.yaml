name: unimarket
description: University Marketplace Mobile Application
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  supabase_flutter: ^2.8.0
  provider: ^6.1.2
  go_router: ^14.6.1
  dio: ^5.7.0
  flutter_secure_storage: ^9.2.2
  cached_network_image: ^3.4.1
  image_picker: ^1.1.2
  shared_preferences: ^2.3.3
  hive_flutter: ^1.1.0
  hive: ^2.2.3
  intl: ^0.19.0
  uuid: ^4.5.1
  flutter_svg: ^2.0.10+1
  google_fonts: ^6.2.1
  shimmer: ^3.0.0
  badges: ^3.1.2
  timeago: ^3.7.0
  url_launcher: ^6.3.1
  permission_handler: ^11.3.1
  connectivity_plus: ^6.1.0
  fl_chart: ^0.69.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700
